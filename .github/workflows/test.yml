name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  powershell-51:
    name: Windows PowerShell 5.1
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fzf
        run: choco install fzf -y
        shell: cmd

      - name: Install test tools
        run: |
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
        shell: powershell

      - name: Run Pester tests
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          Invoke-Pester -Path ./tests -CI
        shell: powershell

      - name: Run PSScriptAnalyzer errors
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./src/cdp.psm1 -Severity Error
          if ($results) {
              $results | Format-Table -AutoSize
              throw "PSScriptAnalyzer found errors."
          }
        shell: powershell

  powershell-7:
    name: PowerShell 7.x
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fzf
        run: choco install fzf -y
        shell: cmd

      - name: Install test tools
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
        shell: pwsh

      - name: Run Pester tests
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          Invoke-Pester -Path ./tests -CI
        shell: pwsh

      - name: Run PSScriptAnalyzer errors
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./src/cdp.psm1 -Severity Error
          if ($results) {
              $results | Format-Table -AutoSize
              throw "PSScriptAnalyzer found errors."
          }
        shell: pwsh

  bash:
    name: Bash smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fzf jq

      - name: Check bash syntax
        run: |
          bash -n ./src/cdp.sh
          bash -n ./install-wsl.sh

      - name: Run bash doctor smoke test
        shell: bash
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          mkdir -p "$tmpdir/project"
          cat > "$tmpdir/projects.json" <<JSON
          [
            {
              "name": "SmokeProject",
              "rootPath": "$tmpdir/project",
              "enabled": true
            }
          ]
          JSON

          source ./src/cdp.sh
          cdp-doctor "$tmpdir/projects.json"
          cdp doctor "$tmpdir/projects.json"
