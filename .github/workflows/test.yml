name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  powershell-51:
    name: Windows PowerShell 5.1
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fzf
        run: choco install fzf -y
        shell: cmd

      - name: Install test tools
        run: |
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
        shell: powershell

      - name: Run Pester tests
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          Invoke-Pester -Path ./tests -CI
        shell: powershell

      - name: Validate release metadata
        run: .\scripts\Test-ReleaseMetadata.ps1
        shell: powershell

      - name: Run PSScriptAnalyzer errors
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./src/cdp.psm1 -Severity Error
          if ($results) {
              $results | Format-Table -AutoSize
              throw "PSScriptAnalyzer found errors."
          }
        shell: powershell

  powershell-7:
    name: PowerShell 7.x
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fzf
        run: choco install fzf -y
        shell: cmd

      - name: Install test tools
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
        shell: pwsh

      - name: Run Pester tests
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          Invoke-Pester -Path ./tests -CI
        shell: pwsh

      - name: Validate release metadata
        run: .\scripts\Test-ReleaseMetadata.ps1
        shell: pwsh

      - name: Run PSScriptAnalyzer errors
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./src/cdp.psm1 -Severity Error
          if ($results) {
              $results | Format-Table -AutoSize
              throw "PSScriptAnalyzer found errors."
          }
        shell: pwsh

  bash:
    name: Bash smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fzf jq

      - name: Check bash syntax
        run: |
          bash -n ./src/cdp.sh
          bash -n ./install-wsl.sh

      - name: Run shell CLI parser tests
        run: bash ./tests/cdp.Cli.Tests.sh

      - name: Run shell status tests
        run: bash ./tests/cdp.Status.Tests.sh

      - name: Run shell safe mutation tests
        run: bash ./tests/cdp.SafeMutations.Tests.sh

      - name: Run bash v2 regression tests
        run: bash ./tests/cdp.Shell.V2.Tests.sh

      - name: Run shell persistence tests
        run: bash ./tests/cdp.Persistence.Tests.sh

      - name: Validate shell installer metadata
        run: bash ./tests/cdp.Installer.Tests.sh

      - name: Build Scoop package smoke
        run: |
          bash ./scripts/New-ScoopPackage.sh 2.1.0 "$RUNNER_TEMP/cdp-2.1.0.tar.gz"
          tar -tzf "$RUNNER_TEMP/cdp-2.1.0.tar.gz" | grep -Fx 'cdp-2.1.0/src/cdp.sh'
          expected_hash="$(jq -r '.hash' scoop/cdp.json)"
          test "$expected_hash" != skip
          test "${#expected_hash}" -eq 64
          printf '%s' "$expected_hash" | grep -Eq '^[0-9a-f]{64}$'

  macos:
    name: macOS smoke
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install fzf jq

      - name: Check bash syntax
        run: |
          bash -n ./src/cdp.sh
          bash -n ./install-wsl.sh

      - name: Run shell CLI parser tests
        run: bash ./tests/cdp.Cli.Tests.sh

      - name: Run shell status tests
        run: bash ./tests/cdp.Status.Tests.sh

      - name: Run shell safe mutation tests
        run: bash ./tests/cdp.SafeMutations.Tests.sh

      - name: Run zsh v2 regression tests
        run: zsh ./tests/cdp.Shell.V2.Tests.sh

      - name: Run shell persistence tests
        run: zsh ./tests/cdp.Persistence.Tests.sh

      - name: Validate shell installer metadata
        run: bash ./tests/cdp.Installer.Tests.sh
