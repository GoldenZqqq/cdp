name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  powershell-51:
    name: Windows PowerShell 5.1
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      PESTER_VERSION: 5.7.1
      PSSCRIPTANALYZER_VERSION: 1.24.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fzf
        run: choco install fzf -y
        shell: cmd

      - name: Install test tools
        run: |
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion $env:PESTER_VERSION -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module PSScriptAnalyzer -RequiredVersion $env:PSSCRIPTANALYZER_VERSION -Force -Scope CurrentUser
        shell: powershell

      - name: Run PowerShell quality gate
        run: .\scripts\Invoke-PowerShellQualityGate.ps1 -ReportDirectory .\artifacts\powershell-51
        shell: powershell

      - name: Upload PowerShell 5.1 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: powershell-51-quality-reports
          path: artifacts/powershell-51
          if-no-files-found: warn

  powershell-7:
    name: PowerShell 7.x
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      PESTER_VERSION: 5.7.1
      PSSCRIPTANALYZER_VERSION: 1.24.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fzf
        run: choco install fzf -y
        shell: cmd

      - name: Install test tools
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion $env:PESTER_VERSION -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module PSScriptAnalyzer -RequiredVersion $env:PSSCRIPTANALYZER_VERSION -Force -Scope CurrentUser
        shell: pwsh

      - name: Run PowerShell quality gate
        run: .\scripts\Invoke-PowerShellQualityGate.ps1 -ReportDirectory .\artifacts\powershell-7
        shell: pwsh

      - name: Upload PowerShell 7 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: powershell-7-quality-reports
          path: artifacts/powershell-7
          if-no-files-found: warn

  web:
    name: Web smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: tests/web/pnpm-lock.yaml

      - name: Install web test dependencies
        run: pnpm --dir tests/web install --frozen-lockfile

      - name: Run web asset and media gates
        run: pnpm --dir tests/web run test:assets

      - name: Install Chromium
        run: pnpm --dir tests/web exec playwright install --with-deps chromium

      - name: Run browser smoke
        run: pnpm --dir tests/web run test:browser

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/web/playwright-report
          if-no-files-found: warn

  bash:
    name: Bash smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fzf jq shellcheck zsh

      - name: Check bash syntax
        run: |
          bash -n ./src/cdp.sh
          bash -n ./src/Shell/*.sh
          bash -n ./install-wsl.sh
          bash -n ./scripts/Build-ShellScript.sh
          bash -n ./scripts/Test-ScoopPackage.sh
          bash -n ./tests/cdp.QualityGates.Tests.sh
          bash -n ./tests/cdp.Status.Json.Tests.sh
          bash -n ./tests/cdp.PathProfiles.Tests.sh
          bash -n ./tests/cdp.Workspace.Lifecycle.Tests.sh
          bash -n ./tests/cdp.Exec.Tests.sh

      - name: Check generated shell artifact
        run: bash ./scripts/Build-ShellScript.sh --check

      - name: Run ShellCheck errors
        run: shellcheck --severity=error --exclude=SC2296 ./src/cdp.sh ./src/Shell/*.sh ./install-wsl.sh ./scripts/Build-ShellScript.sh ./scripts/Test-ScoopPackage.sh ./tests/cdp.QualityGates.Tests.sh ./tests/cdp.Status.Json.Tests.sh ./tests/cdp.PathProfiles.Tests.sh ./tests/cdp.Workspace.Lifecycle.Tests.sh ./tests/cdp.Exec.Tests.sh

      - name: Run shell modularization tests
        run: bash ./tests/cdp.Shell.Modularization.Tests.sh

      - name: Run shell CLI parser tests
        run: bash ./tests/cdp.Cli.Tests.sh

      - name: Run shell status tests
        run: bash ./tests/cdp.Status.Tests.sh

      - name: Run shell status JSON tests
        run: bash ./tests/cdp.Status.Json.Tests.sh

      - name: Run path profile contract tests
        run: bash ./tests/cdp.PathProfiles.Tests.sh

      - name: Run workspace lifecycle contract tests
        run: bash ./tests/cdp.Workspace.Lifecycle.Tests.sh

      - name: Run multi-repo exec contract tests
        run: bash ./tests/cdp.Exec.Tests.sh

      - name: Run status performance regressions
        run: bash ./tests/cdp.Status.Performance.Tests.sh

      - name: Run quality gate regressions
        run: bash ./tests/cdp.QualityGates.Tests.sh

      - name: Run shell safe mutation tests
        run: bash ./tests/cdp.SafeMutations.Tests.sh

      - name: Run bash v2 regression tests
        run: bash ./tests/cdp.Shell.V2.Tests.sh

      - name: Run shell persistence tests
        run: bash ./tests/cdp.Persistence.Tests.sh

      - name: Run Bash 3.2 compatibility matrix
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/work" -w /work bash@sha256:3a13e5da38baa575985778cd09ce8ac736d4b4dafc91a430e71271f6e5311b89 sh -c '
            apk add --no-cache git jq fzf zsh >/dev/null
            bash ./tests/cdp.Shell.Modularization.Tests.sh
            bash ./tests/cdp.Cli.Tests.sh
            bash ./tests/cdp.Status.Tests.sh
            bash ./tests/cdp.Status.Json.Tests.sh
            bash ./tests/cdp.PathProfiles.Tests.sh
            bash ./tests/cdp.Workspace.Lifecycle.Tests.sh
            bash ./tests/cdp.Exec.Tests.sh
            bash ./tests/cdp.SafeMutations.Tests.sh
            bash ./tests/cdp.Shell.V2.Tests.sh
            bash ./tests/cdp.Persistence.Tests.sh
          '

      - name: Validate shell installer metadata
        run: bash ./tests/cdp.Installer.Tests.sh

      - name: Build Scoop package smoke
        run: |
          bash ./scripts/Test-ScoopPackage.sh "$RUNNER_TEMP/cdp-package.tar.gz"

  macos:
    name: macOS smoke
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install coreutils fzf jq shellcheck

      - name: Check bash syntax
        run: |
          bash -n ./src/cdp.sh
          bash -n ./src/Shell/*.sh
          bash -n ./install-wsl.sh
          bash -n ./scripts/Build-ShellScript.sh
          bash -n ./scripts/Test-ScoopPackage.sh
          bash -n ./tests/cdp.QualityGates.Tests.sh
          bash -n ./tests/cdp.Status.Json.Tests.sh
          bash -n ./tests/cdp.PathProfiles.Tests.sh
          bash -n ./tests/cdp.Workspace.Lifecycle.Tests.sh
          bash -n ./tests/cdp.Exec.Tests.sh

      - name: Check generated shell artifact
        run: bash ./scripts/Build-ShellScript.sh --check

      - name: Run ShellCheck errors
        run: shellcheck --severity=error --exclude=SC2296 ./src/cdp.sh ./src/Shell/*.sh ./install-wsl.sh ./scripts/Build-ShellScript.sh ./scripts/Test-ScoopPackage.sh ./tests/cdp.QualityGates.Tests.sh ./tests/cdp.Status.Json.Tests.sh ./tests/cdp.PathProfiles.Tests.sh ./tests/cdp.Workspace.Lifecycle.Tests.sh ./tests/cdp.Exec.Tests.sh

      - name: Run shell modularization tests
        run: bash ./tests/cdp.Shell.Modularization.Tests.sh

      - name: Run shell CLI parser tests
        run: bash ./tests/cdp.Cli.Tests.sh

      - name: Run shell status tests
        run: bash ./tests/cdp.Status.Tests.sh

      - name: Run shell status JSON tests
        run: zsh ./tests/cdp.Status.Json.Tests.sh

      - name: Run path profile contract tests
        run: zsh ./tests/cdp.PathProfiles.Tests.sh

      - name: Run workspace lifecycle contract tests
        run: zsh ./tests/cdp.Workspace.Lifecycle.Tests.sh

      - name: Run multi-repo exec contract tests
        run: zsh ./tests/cdp.Exec.Tests.sh

      - name: Run status performance regressions
        run: bash ./tests/cdp.Status.Performance.Tests.sh

      - name: Run shell safe mutation tests
        run: bash ./tests/cdp.SafeMutations.Tests.sh

      - name: Run zsh v2 regression tests
        run: zsh ./tests/cdp.Shell.V2.Tests.sh

      - name: Run shell persistence tests
        run: zsh ./tests/cdp.Persistence.Tests.sh

      - name: Validate shell installer metadata
        run: bash ./tests/cdp.Installer.Tests.sh
