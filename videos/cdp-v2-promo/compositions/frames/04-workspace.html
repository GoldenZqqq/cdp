<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  #root { width: 1920px; height: 1080px; background: #0A0E17; overflow: hidden; position: relative; font-family: 'JetBrains Mono', monospace; }
  .tabs-bar { position: absolute; top: 60px; left: 80px; right: 80px; height: 44px; display: flex; gap: 2px; }
  .tab { padding: 0 24px; display: flex; align-items: center; font-size: 14px; border-radius: 8px 8px 0 0; opacity: 0; transform: translateY(10px); }
  .tab:nth-child(1) { background: #0D1117; color: #00D4AA; }
  .tab:nth-child(2) { background: #161B22; color: #FFD93D; }
  .tab:nth-child(3) { background: #161B22; color: #58A6FF; }
  .terminal { position: absolute; top: 104px; left: 80px; right: 80px; bottom: 60px; background: #0D1117; border: 1px solid rgba(0,212,170,0.2); border-radius: 0 12px 12px 12px; overflow: hidden; }
  .terminal-body { padding: 20px 24px; color: #E8E8E8; font-size: 18px; line-height: 1.8; }
  .line { opacity: 0; }
  .prompt { color: #00D4AA; }
  .output { color: #3FB950; }
  .accent { color: #00D4AA; }
</style>
</head>
<body>
<div id="root" data-width="1920" data-height="1080" data-composition-id="04-workspace" data-duration="4">
  <div class="clip tabs-bar" data-start="0" data-duration="4" data-track-index="1">
    <div class="tab" id="t1">api</div>
    <div class="tab" id="t2">frontend</div>
    <div class="tab" id="t3">docs</div>
  </div>
  <div class="clip terminal" data-start="0" data-duration="4" data-track-index="0">
    <div class="terminal-body">
      <div class="line" id="l1"><span class="prompt">$</span> cdp workspace fullstack</div>
      <div class="line" id="l2"><span class="output">  Opened tab: api</span></div>
      <div class="line" id="l3"><span class="output">  Opened tab: frontend</span></div>
      <div class="line" id="l4"><span class="output">  Opened tab: docs</span></div>
      <div class="line" id="l5" style="margin-top: 16px; color: #6B7280; font-size: 14px;">One command. Full stack ready.</div>
    </div>
  </div>
</div>
<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({ paused: true });

tl.to('#l1', { opacity: 1, duration: 0.3 }, 0);
tl.to('#l2', { opacity: 1, duration: 0.2 }, 0.8);
tl.to('#t1', { opacity: 1, y: 0, duration: 0.3, ease: 'back.out(2)' }, 0.8);
tl.to('#l3', { opacity: 1, duration: 0.2 }, 1.3);
tl.to('#t2', { opacity: 1, y: 0, duration: 0.3, ease: 'back.out(2)' }, 1.3);
tl.to('#l4', { opacity: 1, duration: 0.2 }, 1.8);
tl.to('#t3', { opacity: 1, y: 0, duration: 0.3, ease: 'back.out(2)' }, 1.8);
tl.to('#l5', { opacity: 1, duration: 0.4 }, 2.8);

window.__timelines['04-workspace'] = tl;
</script>
</body>
</html>
