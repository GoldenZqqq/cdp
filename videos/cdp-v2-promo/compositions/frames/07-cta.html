<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  #root { width: 1920px; height: 1080px; background: #0A0E17; overflow: hidden; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .install-block { margin-bottom: 40px; opacity: 0; transform: translateY(20px); }
  .install-label { font-family: 'Inter', sans-serif; font-size: 16px; color: #6B7280; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.12em; }
  .install-cmd { font-family: 'JetBrains Mono', monospace; font-size: 22px; color: #00D4AA; background: #0D1117; border: 1px solid rgba(0,212,170,0.25); border-radius: 8px; padding: 14px 24px; }
  .logo-area { margin-top: 48px; text-align: center; opacity: 0; transform: scale(0.9); }
  .logo-text { font-family: 'Inter', sans-serif; font-size: 80px; font-weight: 700; color: #00D4AA; letter-spacing: -0.02em; }
  .tagline { font-family: 'Inter', sans-serif; font-size: 24px; color: #E8E8E8; margin-top: 12px; font-weight: 400; }
  .github-url { font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #58A6FF; margin-top: 20px; opacity: 0; }
  .star-hint { font-family: 'Inter', sans-serif; font-size: 16px; color: #FFD93D; margin-top: 8px; opacity: 0; }
</style>
</head>
<body>
<div id="root" data-width="1920" data-height="1080" data-composition-id="07-cta" data-duration="5">
  <div class="clip install-block" id="install1" data-start="0" data-duration="5" data-track-index="0">
    <div class="install-label">PowerShell</div>
    <div class="install-cmd">Install-Module -Name cdp -Scope CurrentUser</div>
  </div>
  <div class="clip install-block" id="install2" data-start="0" data-duration="5" data-track-index="1">
    <div class="install-label">macOS / Linux</div>
    <div class="install-cmd">brew install fzf jq && curl -sL ...cdp/install-wsl.sh | bash</div>
  </div>
  <div class="clip logo-area" id="logo" data-start="0" data-duration="5" data-track-index="2">
    <div class="logo-text">cdp</div>
    <div class="tagline">Your project workbench in the terminal</div>
  </div>
  <div class="clip github-url" id="ghurl" data-start="0" data-duration="5" data-track-index="3">
    github.com/GoldenZqqq/cdp
  </div>
  <div class="clip star-hint" id="star" data-start="0" data-duration="5" data-track-index="4">
    ⭐ Star on GitHub
  </div>
</div>
<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({ paused: true });

tl.to('#install1', { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 0);
tl.to('#install2', { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 0.5);
tl.to('#logo', { opacity: 1, scale: 1, duration: 0.6, ease: 'back.out(1.5)' }, 1.5);
tl.to('#ghurl', { opacity: 1, duration: 0.4 }, 2.8);
tl.to('#star', { opacity: 1, duration: 0.4 }, 3.3);

window.__timelines['07-cta'] = tl;
</script>
</body>
</html>
